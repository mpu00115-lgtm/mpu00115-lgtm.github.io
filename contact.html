<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — [SiteName]</title>
<meta name="description" content="Contact [SiteName] with questions, corrections, or suggestions for new calculators. Reach us by email or the contact form.">
<link rel="canonical" href="https://example.com/contact">
<style>
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:#1b1b1f;line-height:1.7}
  .wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:1.7rem}
  a{color:#1a5fb4} nav{font-size:.9rem;margin-bottom:18px}
  nav a{margin-right:14px} .muted{color:#5a5a66;font-size:.85rem}
  label{display:block;font-weight:600;margin:14px 0 4px}
  input,textarea{width:100%;padding:11px;border:1px solid #cfcfd8;border-radius:8px;font-size:1rem;font-family:inherit}
  button{margin-top:16px;background:#1a5fb4;color:#fff;border:0;border-radius:9px;padding:12px 20px;font-size:1rem;font-weight:700;cursor:pointer}
  .box{background:#f6f7fb;border:1px solid #e3e3ea;border-radius:12px;padding:20px;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
<nav><a href="/">Home</a><a href="/about">About</a><a href="/privacy">Privacy</a><a href="/terms">Terms</a></nav>

<h1>Contact Us</h1>
<p>We welcome your questions, corrections, and ideas for new calculators. We typically respond within 1–2 business days.</p>

<div class="box">
  <p><strong>Email:</strong> <a href="mailto:hello@example.com">hello@example.com</a></p>
  <p class="muted">For privacy-related questions, use privacy@example.com.</p>
</div>

<!-- 작동하는 폼: 배포 시 Formspree/Cloudflare 등 무료 폼 핸들러 action 교체 -->
<form action="https://formspree.io/f/your-form-id" method="POST">
  <label for="name">Your name</label>
  <input id="name" name="name" type="text" required>
  <label for="email">Your email</label>
  <input id="email" name="email" type="email" required>
  <label for="message">Message</label>
  <textarea id="message" name="message" rows="6" required></textarea>
  <button type="submit">Send message</button>
</form>

<p class="muted" style="margin-top:24px">© 2026 [SiteName]. All rights reserved.</p>
</div>
</body>
</html>
