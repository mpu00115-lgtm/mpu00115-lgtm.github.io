<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>TikTok OAuth Callback</title>
<style>
  body{font-family:"Segoe UI",system-ui,sans-serif;background:#0f1b3d;color:#eaf0ff;
    display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;padding:20px}
  .box{background:#1a2a55;border:1px solid #2f4a8a;border-radius:16px;padding:32px;max-width:560px;width:100%;text-align:center}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#aebbdd;font-size:14px;margin:6px 0 18px}
  .label{font-size:12px;letter-spacing:1px;color:#7fa0ff;text-transform:uppercase;text-align:left;margin:14px 0 4px}
  textarea{width:100%;height:70px;background:#0f1b3d;color:#9fe8d0;border:1px solid #2f4a8a;border-radius:10px;
    padding:12px;font-family:Consolas,monospace;font-size:13px;resize:none;box-sizing:border-box}
  button{margin-top:14px;background:#2f6df0;color:#fff;border:none;border-radius:10px;padding:12px 22px;
    font-size:15px;font-weight:700;cursor:pointer;width:100%}
  button:hover{background:#2257c9}
  .ok{color:#0fae8e;font-weight:700;margin-top:10px;min-height:20px}
  .err{color:#ff8a8a}
</style>
</head>
<body>
<div class="box">
  <h1>✅ TikTok 인증 코드</h1>
  <p>아래 <b>전체 텍스트</b>를 복사해서 스크립트에 붙여넣으세요.</p>
  <div class="label">Authorization Code</div>
  <textarea id="code" readonly></textarea>
  <div class="label">State</div>
  <textarea id="state" readonly style="height:40px"></textarea>
  <button onclick="copyCode()">코드 복사</button>
  <div class="ok" id="msg"></div>
</div>
<script>
  var p=new URLSearchParams(location.search);
  var code=p.get('code')||'', state=p.get('state')||'', err=p.get('error')||'';
  if(err){
    document.getElementById('code').value='ERROR: '+err+' / '+(p.get('error_description')||'');
    document.querySelector('h1').textContent='⚠️ 인증 실패';
    document.querySelector('h1').className='err';
  } else {
    document.getElementById('code').value=code;
    document.getElementById('state').value=state;
  }
  function copyCode(){
    var t=document.getElementById('code'); t.select();
    navigator.clipboard.writeText(t.value).then(function(){
      document.getElementById('msg').textContent='복사됨! 스크립트에 붙여넣으세요.';
    },function(){ document.execCommand('copy');
      document.getElementById('msg').textContent='복사됨!'; });
  }
</script>
</body>
</html>
